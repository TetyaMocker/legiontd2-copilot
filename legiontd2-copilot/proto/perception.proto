syntax = "proto3";

package perception;

option go_package = "github.com/yourname/legiontd2-copilot/internal/perceptionclient/pb";
option optimize_for = SPEED;

// PerceptionService — единственная граница между Go-ядром и Python CV/OCR.
// Go никогда не работает с изображениями напрямую (см. ТЗ, раздел 8.2).
service PerceptionService {
  // ReadEconomy — дешёвый, частый вызов: Mythium, доход, номер волны, таймер.
  // MVP (Фаза 1) реализует только этот метод.
  rpc ReadEconomy(ReadEconomyRequest) returns (EconomyState);

  // ReadBattlefield — дорогой, редкий вызов: позиции юнитов на поле.
  // Реализуется в Фазе 2, после офлайн-датасета (см. ТЗ 8.4, Phase 2.3).
  rpc ReadBattlefield(ReadBattlefieldRequest) returns (BattlefieldState);

  // HealthCheck — используется для индикатора "вижу поле уверенно / не уверен / не вижу" (FR5).
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

message ReadEconomyRequest {
  // Зарезервировано под параметры захвата (регион экрана, монитор и т.п.)
}

message EconomyState {
  int32 mythium = 1;
  int32 income = 2;
  int32 wave_number = 3;
  int32 wave_timer_seconds = 4;
  int32 king_hp_percent = 5;
  int32 ally_king_hp_percent = 6;
  float confidence = 7; // 0.0–1.0, используется для FR5
}

message ReadBattlefieldRequest {}

message BattlefieldState {
  repeated UnitPlacement units = 1;
  float confidence = 2;
}

message UnitPlacement {
  string unit_id = 1;   // соответствует id из /units API (например fire_elemental_unit_id)
  float x = 2;
  float y = 3;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool game_window_detected = 1;
  bool capture_healthy = 2;
  string message = 3;
}
