<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LT2 Copilot</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>LT2 Copilot</h1>
    <span id="status" style="font-size:12px;color:#8b949e" id="status">●</span>
  </header>

  <div class="grid">
    <div class="card"><div class="label">Mythium</div><div class="value" id="mythium">—</div></div>
    <div class="card"><div class="label">Zoloto</div><div class="value" id="gold">—</div></div>
    <div class="card"><div class="label">Dohod</div><div class="value" id="income">—</div></div>
    <div class="card"><div class="label">Volna</div><div class="value" id="wave">—</div></div>
    <div class="card"><div class="label">Faza</div><div class="value" id="phase">—</div></div>
    <div class="card"><div class="label">Taymer</div><div class="value" id="timer">—</div></div>
    <div class="card"><div class="label">Snabzhenie</div><div class="value" id="supply">—</div></div>
  </div>

  <div class="panel-row">
    <div class="panel">
      <h2>Ruka (dostupnye uniti)</h2>
      <div id="handUnits" class="unit-list"></div>
    </div>
    <div class="panel">
      <h2>Naymniki</h2>
      <div id="mercs" class="unit-list"></div>
    </div>
  </div>

  <div class="advice">
    <h2>Rekomendatsii</h2>
    <ul id="recommendations"></ul>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
