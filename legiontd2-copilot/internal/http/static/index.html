<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LTD2 Assistant</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>LTD2 Assistant</h1>
    <span id="status" style="font-size:12px;color:#8b949e">● Статус: ожидание</span>
  </header>

  <div class="grid">
    <div class="card"><div class="label">Мифиум</div><div class="value" id="mythium">—</div></div>
    <div class="card"><div class="label">Золото</div><div class="value" id="gold">—</div></div>
    <div class="card"><div class="label">Доход</div><div class="value" id="income">—</div></div>
    <div class="card"><div class="label">Волна</div><div class="value" id="wave">—</div></div>
    <div class="card"><div class="label">Фаза</div><div class="value" id="phase">—</div></div>
    <div class="card"><div class="label">Таймер</div><div class="value" id="timer">—</div></div>
    <div class="card"><div class="label">Снабжение</div><div class="value" id="supply">—</div></div>
  </div>

  <div class="panel-row">
    <div class="panel">
      <h2>Доступные юниты</h2>
      <div id="handUnits" class="unit-list"></div>
    </div>
    <div class="panel">
      <h2>Наёмники</h2>
      <div id="mercs" class="unit-list"></div>
    </div>
  </div>

  <div class="advice">
    <h2>Рекомендации</h2>
    <ul id="recommendations"></ul>
  </div>

  <details class="debug-panel">
    <summary>🐛 Сырые данные (debug)</summary>
    <button id="copyDebug" class="copy-btn">Копировать</button>
    <pre id="rawDebug">(ожидание данных)</pre>
  </details>
</div>
<script src="app.js"></script>
</body>
</html>
