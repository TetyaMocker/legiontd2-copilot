<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LT2 Copilot</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>LT2 Copilot</h1>
    <span class="status" id="status">—</span>
  </header>

  <div class="grid">
    <div class="card">
      <div class="label">Mythium</div>
      <div class="value" id="mythium">—</div>
    </div>
    <div class="card">
      <div class="label">Доход</div>
      <div class="value" id="income">—</div>
    </div>
    <div class="card">
      <div class="label">Волна</div>
      <div class="value" id="wave">—</div>
    </div>
    <div class="card">
      <div class="label">Таймер</div>
      <div class="value" id="timer">—</div>
    </div>
    <div class="card">
      <div class="label">HP короля</div>
      <div class="value" id="kingHp">—</div>
    </div>
    <div class="card">
      <div class="label">Уверенность</div>
      <div class="value" id="confidence">—</div>
    </div>
  </div>

  <div class="advice">
    <h2>Рекомендации</h2>
    <ul id="recommendations"></ul>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
